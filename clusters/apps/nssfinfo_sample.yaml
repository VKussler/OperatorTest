nssai_config:
  # Existing slice configuration (example)
  - sst: 1
    sd: 000001
    allowed_nssai_list:
      - sst: 1
        sd: 000001
    amf_selection_rules:
      - amf_id: 1
      - amf_id: 2
  - sst: 1
    sd: 000002
    allowed_nssai_list:
      - sst: 1
        sd: 000002
    amf_selection_rules:
      - amf_id: 1
      - amf_id: 3
  # New slice: 'test-slice' with SST 4 and SD 000401
  - sst: 4
    sd: 000401
    allowed_nssai_list:
      # Defines the allowed S-NSSAI configurations for this slice.
      # In this case, the slice itself is allowed.
      - sst: 4
        sd: 000401
    amf_selection_rules:
      # Specifies which AMF IDs are capable of serving this S-NSSAI.
      # Ensure these AMF IDs correspond to your deployed AMFs.
      - amf_id: 1
      - amf_id: 2