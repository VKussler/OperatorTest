# NSSF Slice Configuration
nssai_config:
  # Existing default slice (example)
  - s_nssai:
      sst: 1
      sd: "010101"
    amf_set_id: "amf_set_01"
    smf_set_id: "smf_set_01"
    nrf_uri: "http://nrf:8000"
  # New network slice 'test-slice'
  - s_nssai:
      sst: 4
      sd: "000401"
    amf_set_id: "amf_set_03" # Associated AMF Set for test-slice
    smf_set_id: "smf_set_03" # Associated SMF Set for test-slice
    nrf_uri: "http://nrf:8000"

amf_sets:
  # Existing AMF Set (example)
  - amf_set_id: "amf_set_01"
    amf_profiles:
      - amf_profile_id: "amf_profile_01"
        amf_nrf_id: "amf_01"
        amf_region_id: "region_01"
        amf_tai_list:
          - tac: 1
            plmn_id:
              mcc: "208"
              mnc: "93"
  # New AMF Set for 'test-slice'
  - amf_set_id: "amf_set_03"
    amf_profiles:
      - amf_profile_id: "amf_profile_03"
        amf_nrf_id: "amf_03" # Unique NRF ID for this AMF instance
        amf_region_id: "region_01" # Can be an existing or new region
        amf_tai_list:
          - tac: 1 # Example TAC, adjust as needed for your deployment
            plmn_id:
              mcc: "208" # Example MCC, adjust as needed
              mnc: "93"  # Example MNC, adjust as needed

smf_sets:
  # Existing SMF Set (example)
  - smf_set_id: "smf_set_01"
    smf_profiles:
      - smf_profile_id: "smf_profile_01"
        smf_nrf_id: "smf_01"
        smf_region_id: "region_01"
        smf_tai_list:
          - tac: 1
            plmn_id:
              mcc: "208"
              mnc: "93"
  # New SMF Set for 'test-slice'
  - smf_set_id: "smf_set_03"
    smf_profiles:
      - smf_profile_id: "smf_profile_03"
        smf_nrf_id: "smf_03" # Unique NRF ID for this SMF instance
        smf_region_id: "region_01" # Can be an existing or new region
        smf_tai_list:
          - tac: 1 # Example TAC, adjust as needed for your deployment
            plmn_id:
              mcc: "208" # Example MCC, adjust as needed
              mnc: "93"  # Example MNC, adjust as needed