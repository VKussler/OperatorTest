nssai_config:
  # Existing slice example (SST 1, SD 010203)
  - s_nssai:
      sst: 1
      sd: 010203
    allowed_nfs:
      amf_nfs:
        - amf_name: oai-amf-1
          amf_ipv4_address: 192.168.70.132
          amf_port: 8000
      smf_nfs:
        - smf_name: oai-smf-1
          smf_ipv4_address: 192.168.70.133
          smf_port: 8000
      upf_nfs:
        - upf_name: oai-upf-1
          upf_ipv4_address: 192.168.70.134
          upf_port: 8000
  # New network slice (SST 4, SD 000401)
  - s_nssai:
      sst: 4
      sd: 000401
    allowed_nfs:
      amf_nfs:
        - amf_name: oai-amf-slice4
          amf_ipv4_address: 192.168.70.140 # Placeholder IP
          amf_port: 8000
      smf_nfs:
        - smf_name: oai-smf-slice4
          smf_ipv4_address: 192.168.70.141 # Placeholder IP
          smf_port: 8000
      upf_nfs:
        - upf_name: oai-upf-slice4
          upf_ipv4_address: 192.168.70.142 # Placeholder IP
          upf_port: 8000