# Open5GS AMF baseline for multi-vendor test
logger:
  file:
    path: /var/log/open5gs/amf.log
global:
  max:
    ue: 1024
amf:
  sbi:
    server:
      - address: 127.0.0.5
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777
  ngap:
    server:
      - address: 127.0.0.5
  metrics:
    server:
      - address: 127.0.0.5
    port: 9090
  guami:
    - plmn_id:
        mcc: "001"
        mnc: "01"
      amf_id:
        region: 2
        set: 1
  tai:
    - plmn_id:
        mcc: "001"
        mnc: "01"
      tac: 1
  plmn_support:
    - plmn_id:
        mcc: "001"
        mnc: "01"
      s_nssai:
        - sst: 1
          sd: "000001"
  security:
    integrity_order: [NIA2, NIA1, NIA0]
    ciphering_order: [NEA0, NEA1, NEA2]
  network_name:
    full: Open5GS
    short: O5GS
  amf_name: open5gs-amf0
  time:
    t3512:
      value: 540
  cNSIIdList:
    - test-slice
  pLMNInfoList:
    - plmn_id:
        mcc: "001"
        mnc: "001"
      s_nssai:
        - sst: 4
          sd: "000401"