apiVersion: cm-5gc.com/v1alpha1
kind: SmfInfo
metadata:
  name: smfinfo-sample
  namespace: default
spec:
  global:
    max:
      ue: 1024
  logger:
    file:
      path: /var/log/open5gs/smf.log
  smf:
    dns:
    - 8.8.8.8
    - 8.8.4.4
    freeDiameter: /etc/freeDiameter/smf.conf
    gtpc:
      server:
      - address: 127.0.0.4
    gtpu:
      server:
      - address: 127.0.0.4
    info:
    - dnn:
      - internet
      s_nssai:
      - sd: "000001"
        sst: 1
      tai:
      - plmn_id:
          mcc: "001"
          mnc: "01"
        tac: 1
    metrics:
      port: 9090
      server:
      - address: 127.0.0.4
    mtu: 1400
    pfcp:
      client:
        upf:
        - address: 127.0.0.7
      server:
      - address: 127.0.0.4
    sbi:
      client:
        nrf:
        - uri: http://127.0.0.10:7777
      server:
      - address: 127.0.0.4
        port: 7777
    session:
    - dnn: internet
      gateway: 10.45.0.1
      subnet: 10.45.0.0/16
    - dnn: test-slice-dnn
      gateway: 10.46.0.1
      name: test-slice-session
      qos:
        5qi: 9
        arp:
          pre_emption_capability: NOT_PREEMPT
          pre_emption_vulnerability: PREEMPT
          priority_level: 8
        gbr:
          downlink: 20Mbps
          uplink: 10Mbps
      subnet: 10.46.0.0/16
