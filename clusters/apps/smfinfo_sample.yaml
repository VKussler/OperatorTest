# Open5GS SMF baseline for multi-vendor test
logger:
  file:
    path: /var/log/open5gs/smf.log
global:
  max:
    ue: 1024
smf:
  sbi:
    server:
      - address: 127.0.0.4
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777
  pfcp:
    server:
      - address: 127.0.0.4
    client:
      upf:
        - address: 127.0.0.7
  gtpc:
    server:
      - address: 127.0.0.4
  gtpu:
    server:
      - address: 127.0.0.4
  metrics:
    server:
      - address: 127.0.0.4
    port: 9090
  session:
    - subnet: 10.45.0.0/16
      gateway: 10.45.0.1
      dnn: internet
  dns:
    - 8.8.8.8
    - 8.8.4.4
  mtu: 1400
  info:
    - s_nssai:
        - sst: 4
          sd: "000401"
      dnn:
        - internet
      tai:
        - plmn_id:
            mcc: "001"
            mnc: "01"
          tac: 1
  freeDiameter: /etc/freeDiameter/smf.conf