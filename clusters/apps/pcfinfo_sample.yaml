# Sample PCF NRM Instance
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
    sNSSAI:
      sst: 1
      sd: "000001"
  - pLMNId:
      mcc: "001"
      mnc: "01"
    sNSSAI:
      sst: 4
      sd: "000401"
sBIFQDN: "pcf-1.sbi.example.com"
managedNFProfile:
  nfInstanceId: "pcf-instance-001"
  nfType: "PCF"
  hostAddr: "192.168.1.11"
pcfInfo:
  dnnList: ["internet", "iot"]
  supiRanges:
    - start: "208930000000000"
      end: "208930000099999"
commModelList:
  - commModelType: "DIRECT_COMMUNICATION"
    targetNFServiceList: ["namf-comm", "nsmf-pdusession"]
policyRules:
  - policyId: "slice-001-01-4-000401-qos-policy"
    matchCriteria:
      pLMNId:
        mcc: "001"
        mnc: "01"
      sNSSAI:
        sst: 4
        sd: "000401"
    policyData:
      qosProfile:
        5qi: 8
        arp:
          priorityLevel: 12
          preemptionCapability: "NOT_PREEMPT"
          preemptionVulnerability: "PREEMPTABLE"
        gbr:
          maxBitRateUL: "100Mbps"
          maxBitRateDL: "200Mbps"
          guaranteedBitRateUL: "50Mbps"
          guaranteedBitRateDL: "100Mbps"
      # Additional policy data can be added here, e.g., traffic steering, charging, etc.
  - policyId: "slice-001-01-4-000401-traffic-steering"
    matchCriteria:
      pLMNId:
        mcc: "001"
        mnc: "01"
      sNSSAI:
        sst: 4
        sd: "000401"
      dnn: "iot" # This policy applies specifically for DNN 'iot' within this slice
    policyData:
      trafficSteering:
        ulcl: "ENABLED"
        routeSelectionDescriptors:
          - dnn: "iot"
            pduSessionType: "IPV4"
            sscMode: "SSC_MODE_2"
            # Further route selection parameters can be added