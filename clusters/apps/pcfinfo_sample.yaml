# NRM PCF baseline for multi-vendor test
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
    sNSSAI:
      - sst: 1
        sd: "000001"
      - sst: 4
        sd: "000401"
sBIFQDN: "test-slice.sbi.example.com"
managedNFProfile:
  nfInstanceId: "pcf-instance-001"
  nfType: "PCF"
  hostAddr: "192.168.1.11"
  allowedNSSAIs:
    - sst: 4
      sd: "000401"
pcfInfo:
  dnnList: ["internet", "iot", "test-slice-dnn"]
  supiRanges:
    - start: "208930000000000"
      end: "208930000099999"
  sliceInfoList:
    - sNSSAI:
        sst: 4
        sd: "000401"
      dnnInfoList:
        - dnn: "test-slice-dnn"
          predefinedPccRuleSetRefs:
            - "test-slice-pcc-rule-1"
            - "test-slice-pcc-rule-2"
          configurable5QISetRef: "test-slice-qos-profile"
          dynamic5QISetRef: "test-slice-dynamic-qos"
commModelList:
  - commModelType: "DIRECT_COMMUNICATION"
    targetNFServiceList: ["namf-comm", "nsmf-pdusession"]
policyData:
  pccRuleSets:
    test-slice-pcc-rule-1:
      pccRuleId: "test-slice-pcc-rule-1"
      precedence: 100
      flowDescriptions:
        - "permit out ip from any to any"
      qosInformation:
        5qi: 9
        arp:
          priorityLevel: 8
          preemptionCapability: "NOT_PREEMPT"
          preemptionVulnerability: "PREEMPTABLE"
    test-slice-pcc-rule-2:
      pccRuleId: "test-slice-pcc-rule-2"
      precedence: 110
      flowDescriptions:
        - "permit in ip from any to any"
      qosInformation:
        5qi: 8
        arp:
          priorityLevel: 7
          preemptionCapability: "MAY_PREEMPT"
          preemptionVulnerability: "NOT_PREEMPTABLE"
  qosProfiles:
    test-slice-qos-profile:
      5qi: 7
      gbrUL: "100Mbps"
      gbrDL: "100Mbps"
      maxPacketLossRateUL: 1
      maxPacketLossRateDL: 1
  dynamicQosProfiles:
    test-slice-dynamic-qos:
      description: "Dynamic QoS profile for test-slice, adjusted based on network conditions."