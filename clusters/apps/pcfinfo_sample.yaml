# NRM PCF baseline for multi-vendor test
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
    sNSSAI:
      - sst: 1
        sd: "000001"
      - sst: 4
        sd: "000401"
sBIFQDN: "test-slice.sbi.example.com"
managedNFProfile:
  nfInstanceId: "pcf-instance-001"
  nfType: "PCF"
  hostAddr: "192.168.1.11"
pcfInfo:
  dnnList: ["internet", "iot"]
  supiRanges:
    - start: "208930000000000"
      end: "208930000099999"
commModelList:
  - commModelType: "DIRECT_COMMUNICATION"
    targetNFServiceList: ["namf-comm", "nsmf-pdusession"]
  - commModelType: "slice_policy"
    commModelConfiguration:
      sliceId: "test-slice"
      sNSSAI:
        sst: 4
        sd: "000401"
      qosPolicy:
        5qi: 8 # Example 5QI for slice
        arp:
          priorityLevel: 7
          preemptionCapability: "NOT_PREEMPT"
          preemptionVulnerability: "PREEMPTABLE"
        gbrUL: "5Mbps" # Guaranteed Bit Rate Uplink
        gbrDL: "10Mbps" # Guaranteed Bit Rate Downlink
        mbrUL: "50Mbps" # Maximum Bit Rate Uplink
        mbrDL: "100Mbps" # Maximum Bit Rate Downlink
      accessPolicy:
        allowedRoaming: true
        allowedRATs: ["NR", "EUTRAN"]
        maxUEs: 1000 # Example policy for the slice