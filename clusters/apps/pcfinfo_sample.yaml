# Sample PCF NRM Instance
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
    sNSSAI:
      sst: 1
      sd: "000001"
  - pLMNId:
      mcc: "208"
      mnc: "93"
    sNSSAI:
      sst: 4
      sd: "000401"
    policyRules:
      sessionManagementPolicies:
        - ruleId: "sm-iot-001"
          pduSessionType: "IPV4"
          qosPolicyIdentifier: "qos-iot-low-latency"
          chargingCharacteristics: "delay-tolerant"
          # Further session management parameters can be added here
      qosPolicies:
        - qosId: "qos-iot-low-latency"
          5qi: 6 # Example: Conversational Voice
          arp:
            priorityLevel: 8
            preemptionCapability: "NOT_PREEMPT"
            preemptionVulnerability: "PREEMPTABLE"
          gbr:
            maxBitRateDl: "10Mbps"
            maxBitRateUl: "5Mbps"
          # Further QoS parameters like MBR, GBR, Notification Control can be added
        - qosId: "qos-iot-best-effort"
          5qi: 9 # Example: Best Effort
          arp:
            priorityLevel: 15
            preemptionCapability: "NOT_PREEMPT"
            preemptionVulnerability: "PREEMPTABLE"
          # Non-GBR QoS parameters
      accessControlPolicies:
        - ruleId: "ac-iot-001"
          allowedNFs: ["AMF", "SMF"] # Example: Only specific NFs can interact
          allowedUEs: # Example: Specific UE groups or SUPI ranges
            - supiRange:
                start: "208930000000100"
                end: "208930000000199"
          # Further access control parameters like allowed DNNs, S-NSSAIs can be added
sBIFQDN: "pcf-1.sbi.example.com"
managedNFProfile:
  nfInstanceId: "pcf-instance-001"
  nfType: "PCF"
  hostAddr: "192.168.1.11"
pcfInfo:
  dnnList: ["internet", "iot"]
  supiRanges:
    - start: "208930000000000"
      end: "208930000099999"
commModelList:
  - commModelType: "DIRECT_COMMUNICATION"
    targetNFServiceList: ["namf-comm", "nsmf-pdusession"]