# Sample PCF NRM Instance
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
    sNSSAI:
      sst: 1
      sd: "000001"
  - pLMNId:
      mcc: "208"
      mnc: "93"
    sNSSAI:
      sst: 4
      sd: "000401"
sBIFQDN: "pcf-1.sbi.example.com"
managedNFProfile:
  nfInstanceId: "pcf-instance-001"
  nfType: "PCF"
  hostAddr: "192.168.1.11"
pcfInfo:
  dnnList: ["internet", "iot"]
  supiRanges:
    - start: "208930000000000"
      end: "208930000099999"
commModelList:
  - commModelType: "DIRECT_COMMUNICATION"
    targetNFServiceList: ["namf-comm", "nsmf-pdusession"]
# New section to define slice-specific policies, QoS parameters, and access rules
slicePolicies:
  - sNSSAI: # This policy applies to the new S-NSSAI
      sst: 4
      sd: "000401"
    policyName: "test-slice-default-policy"
    description: "Default policy for 'test-slice' (sst=4, sd=000401) including QoS and access rules."
    qosParameters:
      5qi: 9 # Example 5QI for general data
      arp:
        priorityLevel: 8
        preemptionCapability: "NOT_PREEMPT"
        preemptionVulnerability: "PREEMPTABLE"
      gbr: # Guaranteed Bit Rate (if applicable for the 5QI)
        downlink: "10Mbps"
        uplink: "5Mbps"
      mbr: # Maximum Bit Rate
        downlink: "20Mbps"
        uplink: "10Mbps"
    accessPolicies:
      - policyId: "allow-all-internet"
        description: "Allow all traffic to/from internet DNN for this slice"
        dnn: "internet"
        trafficFilters:
          - direction: "UPSTREAM"
            ipFilter: "permit out ip any any"
          - direction: "DOWNSTREAM"
            ipFilter: "permit in ip any any"
      - policyId: "allow-iot-specific"
        description: "Allow specific IoT traffic to/from IoT DNN for this slice"
        dnn: "iot"
        trafficFilters:
          - direction: "UPSTREAM"
            ipFilter: "permit out tcp any host 192.168.10.10 eq 8883" # Example IoT server
          - direction: "DOWNSTREAM"
            ipFilter: "permit in tcp host 192.168.10.10 eq 8883 any"
    pccRules: # Policy and Charging Control rules (example)
      - ruleId: "default-pcc-rule"
        description: "Default PCC rule for general traffic"
        precedence: 255
        flowDescriptions:
          - "permit ip any any"
        qosInformation:
          5qi: 9
          arp:
            priorityLevel: 8
        chargingInformation:
          chargingMethod: "OFFLINE"
          ratingGroup: 1