# Sample NRF NRM Instance
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
sBIFQDN: "nrf-1.sbi.example.com"
nFProfileList:
  - nfInstanceId: "nrf-instance-001"
    nfType: "NRF"
    nfStatus: "REGISTERED"
    fqdn: "nrf-1.example.com"
    nfServices:
      - serviceInstanceId: "service-1"
        serviceName: "nnrf-nfm"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  - nfInstanceId: "nssf-instance-001"
    nfType: "NSSF"
    nfStatus: "REGISTERED"
    fqdn: "nssf-1.example.com"
    pLMNIdList:
      - mcc: "208"
        mnc: "93"
    nssfInfo:
      nssaiAvailabilityList:
        - plmnId:
            mcc: "208"
            mnc: "93"
          supportedSnssaiList:
            - sst: 4
              sd: "000401"
  - nfInstanceId: "amf-instance-001"
    nfType: "AMF"
    nfStatus: "REGISTERED"
    fqdn: "amf-1.example.com"
    pLMNIdList:
      - mcc: "208"
        mnc: "93"
    amfInfo:
      guamiList:
        - plmnId:
            mcc: "208"
            mnc: "93"
          amfId: "000001" # Example AMF ID
      taiList:
        - plmnId:
            mcc: "208"
            mnc: "93"
          tac: "000001" # Example Tracking Area Code
      nssai:
        supportedSnssaiList:
          - sst: 4
            sd: "000401"
  - nfInstanceId: "smf-instance-001"
    nfType: "SMF"
    nfStatus: "REGISTERED"
    fqdn: "smf-1.example.com"
    pLMNIdList:
      - mcc: "208"
        mnc: "93"
    smfInfo:
      sNssaiSmfInfoList:
        - sNssai:
            sst: 4
            sd: "000401"
          dnnList:
            - dnn: "test-dnn"
              pduSessionTypes: ["IPV4", "IPV6"]
  - nfInstanceId: "upf-instance-001"
    nfType: "UPF"
    nfStatus: "REGISTERED"
    fqdn: "upf-1.example.com"
    pLMNIdList:
      - mcc: "208"
        mnc: "93"
    upfInfo:
      sNssaiUpfInfoList:
        - sNssai:
            sst: 4
            sd: "000401"
          dnnUpfInfoList:
            - dnn: "test-dnn"
              # Additional UPF-specific info like interfaces, etc., can be added here
nrfInfo:
  servedPcfInfo:
    pcf-1: {}
  servedAmfInfo:
    amf-1: {}