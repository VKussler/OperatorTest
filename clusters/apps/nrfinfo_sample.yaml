# Sample NRF NRM Instance
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
    sNssaiList: # Updated NRF's own pLMNInfoList to include the new S-NSSAI
      - sst: 4
        sd: "000401"
cNSIIdList: # Updated NRF's own cNSIIdList to include the new S-NSSAI
  - sst: 4
    sd: "000401"
sBIFQDN: "nrf-1.sbi.example.com" # NRF's sBIFQDN remains unchanged as no specific update was requested for its value
nFProfileList:
  - nfInstanceId: "nrf-instance-001"
    nfType: "NRF"
    nfStatus: "REGISTERED"
    fqdn: "nrf-1.example.com"
    sNssais: # Added the new S-NSSAI to NRF's own profile
      - sst: 4
        sd: "000401"
    nfServices:
      - serviceInstanceId: "service-1"
        serviceName: "nnrf-nfm"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  - nfInstanceId: "amf-instance-001" # Example of another NF (AMF) registered with NRF
    nfType: "AMF"
    nfStatus: "REGISTERED"
    fqdn: "amf-1.example.com"
    sNssais: # Updated the AMF's profile to include the new S-NSSAI
      - sst: 4
        sd: "000401"
    # Other AMF-specific fields would typically be here
nrfInfo:
  servedPcfInfo:
    pcf-1: {}
  servedAmfInfo:
    amf-1: {}