# Sample NRF NRM Instance
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
sBIFQDN: "nrf-1.sbi.example.com"
nfProfileList:
  - nfInstanceId: "nrf-instance-001"
    nfType: "NRF"
    nfStatus: "REGISTERED"
    fqdn: "nrf-1.example.com"
    nfServices:
      - serviceInstanceId: "service-1"
        serviceName: "nnrf-nfm"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  # New NSSF for 'test-slice'
  - nfInstanceId: "nssf-test-slice-001"
    nfType: "NSSF"
    nfStatus: "REGISTERED"
    fqdn: "nssf-test-slice.example.com"
    pLMNIdList:
      - mcc: "208"
        mnc: "93"
    sNssaiList:
      - sst: 4
        sd: "000401"
    nfServices:
      - serviceInstanceId: "nssf-nsselection-service-001"
        serviceName: "nnssf-nsselection"
        versions: ["1.1.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
      - serviceInstanceId: "nssf-nslmf-service-001"
        serviceName: "nnssf-nslmf"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  # New AMF for 'test-slice'
  - nfInstanceId: "amf-test-slice-001"
    nfType: "AMF"
    nfStatus: "REGISTERED"
    fqdn: "amf-test-slice.example.com"
    pLMNIdList:
      - mcc: "208"
        mnc: "93"
    guamiList:
      - pLMNId:
          mcc: "208"
          mnc: "93"
        amfId: "000001" # Example AMF ID
    taiList:
      - pLMNId:
          mcc: "208"
          mnc: "93"
        tac: "0001" # Example Tracking Area Code
    sNssaiList:
      - sst: 4
        sd: "000401"
    nfServices:
      - serviceInstanceId: "amf-comm-service-001"
        serviceName: "namf-comm"
        versions: ["1.1.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
      - serviceInstanceId: "amf-evnt-service-001"
        serviceName: "namf-evnt"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  # New SMF for 'test-slice'
  - nfInstanceId: "smf-test-slice-001"
    nfType: "SMF"
    nfStatus: "REGISTERED"
    fqdn: "smf-test-slice.example.com"
    pLMNIdList:
      - mcc: "208"
        mnc: "93"
    sNssaiList:
      - sst: 4
        sd: "000401"
    nfServices:
      - serviceInstanceId: "smf-pdusession-service-001"
        serviceName: "nsmf-pdusession"
        versions: ["1.1.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
      - serviceInstanceId: "smf-eventexposure-service-001"
        serviceName: "nsmf-eventexposure"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  # New UPF for 'test-slice'
  - nfInstanceId: "upf-test-slice-001"
    nfType: "UPF"
    nfStatus: "REGISTERED"
    fqdn: "upf-test-slice.example.com"
    pLMNIdList:
      - mcc: "208"
        mnc: "93"
    sNssaiList:
      - sst: 4
        sd: "000401"
    upfInfo:
      pduSessionAnchorSmfInfoList:
        - smfInstanceId: "smf-test-slice-001" # Link to the SMF
          sNssai:
            sst: 4
            sd: "000401"
      interfaceUpfInfoList:
        - interfaceType: "N3"
          endpoints: ["10.0.0.1"]
          networkInstance: "internet"
        - interfaceType: "N9"
          endpoints: ["10.0.0.2"]
          networkInstance: "internet"
    nfServices:
      - serviceInstanceId: "upf-pfdmanagement-service-001"
        serviceName: "nupf-pfdmanagement"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  # New PCF for 'test-slice'
  - nfInstanceId: "pcf-test-slice-001"
    nfType: "PCF"
    nfStatus: "REGISTERED"
    fqdn: "pcf-test-slice.example.com"
    pLMNIdList:
      - mcc: "208"
        mnc: "93"
    sNssaiList:
      - sst: 4
        sd: "000401"
    nfServices:
      - serviceInstanceId: "pcf-policymanagement-service-001"
        serviceName: "npcf-policymanagement"
        versions: ["1.1.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
      - serviceInstanceId: "pcf-bdtpolicy-service-001"
        serviceName: "npcf-bdtpolicy"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
nrfInfo:
  servedPcfInfo:
    pcf-1: {}
    pcf-test-slice-001: {} # Add the new PCF
  servedAmfInfo:
    amf-1: {}
    amf-test-slice-001: {} # Add the new AMF