# Sample NRF NRM Instance
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
  - pLMNId: # New PLMN ID for the 'test-slice'
      mcc: "310"
      mnc: "260"
sBIFQDN: "nrf-1.sbi.example.com"
nFProfileList:
  - nfInstanceId: "nrf-instance-001"
    nfType: "NRF"
    nfStatus: "REGISTERED"
    fqdn: "nrf-1.example.com"
    nfServices:
      - serviceInstanceId: "service-1"
        serviceName: "nnrf-nfm"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  # NSSF Profile for 'test-slice'
  - nfInstanceId: "nssf-instance-test-slice-001"
    nfType: "NSSF"
    nfStatus: "REGISTERED"
    fqdn: "nssf-test-slice-1.example.com"
    nfServices:
      - serviceInstanceId: "nssf-service-nsselection-test-slice"
        serviceName: "nnssf-nsselection"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
    allowedNssaiList: # General allowed S-NSSAIs for this NF
      - sst: 4
        sd: "000401"
    plmnId: # General PLMN ID for this NF
      mcc: "310"
      mnc: "260"
    nssfInfo: # NSSF specific info, including supported S-NSSAIs
      nssaiAvailabilityList:
        - plmnId:
            mcc: "310"
            mnc: "260"
          supportedSnssaiList:
            - sst: 4
              sd: "000401"
  # AMF Profile for 'test-slice'
  - nfInstanceId: "amf-instance-test-slice-001"
    nfType: "AMF"
    nfStatus: "REGISTERED"
    fqdn: "amf-test-slice-1.example.com"
    nfServices:
      - serviceInstanceId: "amf-service-comm-test-slice"
        serviceName: "namf-comm"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
    allowedNssaiList:
      - sst: 4
        sd: "000401"
    plmnId:
      mcc: "310"
      mnc: "260"
    amfInfo: # AMF specific info
      guamiList:
        - plmnId:
            mcc: "310"
            mnc: "260"
          amfId: "amf-id-test-slice-001" # Example AMF ID
      taiList:
        - plmnId:
            mcc: "310"
            mnc: "260"
          tac: "000001" # Example Tracking Area Code
  # SMF Profile for 'test-slice'
  - nfInstanceId: "smf-instance-test-slice-001"
    nfType: "SMF"
    nfStatus: "REGISTERED"
    fqdn: "smf-test-slice-1.example.com"
    nfServices:
      - serviceInstanceId: "smf-service-pdusession-test-slice"
        serviceName: "nsmf-pdusession"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
    allowedNssaiList:
      - sst: 4
        sd: "000401"
    plmnId:
      mcc: "310"
      mnc: "260"
    smfInfo: # SMF specific info
      sNssaiSmfInfoList:
        - sNssai:
            sst: 4
            sd: "000401"
          dcnr: false # Dual Connectivity with New Radio (DCNR) support
          pduSessionTypes: ["IPV4", "IPV6"] # Example PDU Session Types
          dnnList: ["internet", "test-slice-dnn"] # Example DNNs
  # UPF Profile for 'test-slice'
  - nfInstanceId: "upf-instance-test-slice-001"
    nfType: "UPF"
    nfStatus: "REGISTERED"
    fqdn: "upf-test-slice-1.example.com"
    nfServices:
      - serviceInstanceId: "upf-service-sbi-test-slice"
        serviceName: "nupf-sbi" # Placeholder service name for UPF SBI
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
    allowedNssaiList:
      - sst: 4
        sd: "000401"
    plmnId:
      mcc: "310"
      mnc: "260"
    upfInfo: # UPF specific info
      sNssaiUpfInfoList:
        - sNssai:
            sst: 4
            sd: "000401"
          dnnUpfInfoList:
            - dnn: "test-slice-dnn" # DNN associated with this slice
              upfIpEndPoints:
                - ipv4Address: "10.0.0.1"
                  endpointFqdn: "upf-ep-1.example.com"
            - dnn: "internet" # Another example DNN
              upfIpEndPoints:
                - ipv4Address: "10.0.0.2"
                  endpointFqdn: "upf-ep-2.example.com"
  # PCF Profile for 'test-slice'
  - nfInstanceId: "pcf-instance-test-slice-001"
    nfType: "PCF"
    nfStatus: "REGISTERED"
    fqdn: "pcf-test-slice-1.example.com"
    nfServices:
      - serviceInstanceId: "pcf-service-smpolicycontrol-test-slice"
        serviceName: "npcf-smpolicycontrol"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
    allowedNssaiList:
      - sst: 4
        sd: "000401"
    plmnId:
      mcc: "310"
      mnc: "260"
    pcfInfo: # PCF specific info
      servedNfType: ["AMF", "SMF"] # Example of NFs served by this PCF
      servedNfSetIdList: ["amf-set-test-slice", "smf-set-test-slice"] # Example NF Set IDs
nrfInfo:
  servedPcfInfo:
    pcf-1: {}
    pcf-instance-test-slice-001: {} # Add the new PCF to servedPcfInfo
  servedAmfInfo:
    amf-1: {}
    amf-instance-test-slice-001: {} # Add the new AMF to servedAmfInfo