# Sample NRF NRM Instance
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
sBIFQDN: "nrf-1.sbi.example.com"
nFProfileList:
  - nfInstanceId: "nrf-instance-001"
    nfType: "NRF"
    nfStatus: "REGISTERED"
    fqdn: "nrf-1.example.com"
    nfServices:
      - serviceInstanceId: "service-1"
        serviceName: "nnrf-nfm"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
nrfInfo:
  servedPcfInfo:
    pcf-1:
      # Associate S-NSSAI sst=4, sd=000401 with PCF instance 'pcf-1'
      supportedNssai:
        - sst: 4
          sd: "000401"
  servedAmfInfo:
    amf-1:
      # Associate S-NSSAI sst=4, sd=000401 with AMF instance 'amf-1'
      supportedNssai:
        - sst: 4
          sd: "000401"
  servedNssfInfo:
    nssf-1: # Assuming 'nssf-1' is the instance ID for the NSSF supporting this slice
      # Associate S-NSSAI sst=4, sd=000401 with NSSF instance 'nssf-1'
      supportedNssai:
        - sst: 4
          sd: "000401"
  servedSmfInfo:
    smf-1: # Assuming 'smf-1' is the instance ID for the SMF supporting this slice
      # Associate S-NSSAI sst=4, sd=000401 with SMF instance 'smf-1'
      supportedNssai:
        - sst: 4
          sd: "000401"
  servedUpfInfo:
    upf-1: # Assuming 'upf-1' is the instance ID for the UPF supporting this slice
      # Associate S-NSSAI sst=4, sd=000401 with UPF instance 'upf-1'
      supportedNssai:
        - sst: 4
          sd: "000401"