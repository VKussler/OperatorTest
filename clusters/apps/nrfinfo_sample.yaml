# Sample NRF NRM Instance
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
sBIFQDN: "nrf-1.sbi.example.com"
nFProfileList:
  - nfInstanceId: "nrf-instance-001"
    nfType: "NRF"
    nfStatus: "REGISTERED"
    fqdn: "nrf-1.example.com"
    nfServices:
      - serviceInstanceId: "service-1"
        serviceName: "nnrf-nfm"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  # NSSF profile for PLMN 208, 93 and S-NSSAI (SST 4, SD 000401)
  - nfInstanceId: "nssf-instance-001"
    nfType: "NSSF"
    nfStatus: "REGISTERED"
    fqdn: "nssf-1.example.com" # sBIFQDN for NSSF
    pLMNIdList:
      - mcc: "208"
        mnc: "93"
    sNssaiList:
      - sst: 4
        sd: "000401"
        sliceName: "test-slice" # Custom field for descriptive purpose
    nfServices:
      - serviceInstanceId: "nssf-service-001"
        serviceName: "nnssf-nsselection"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  # AMF profile for PLMN 208, 93 and S-NSSAI (SST 4, SD 000401)
  - nfInstanceId: "amf-instance-001"
    nfType: "AMF"
    nfStatus: "REGISTERED"
    fqdn: "amf-1.example.com" # sBIFQDN for AMF
    pLMNIdList:
      - mcc: "208"
        mnc: "93"
    sNssaiList:
      - sst: 4
        sd: "000401"
        sliceName: "test-slice" # Custom field for descriptive purpose
    nfServices:
      - serviceInstanceId: "amf-service-001"
        serviceName: "namf-comm"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  # SMF profile for PLMN 208, 93 and S-NSSAI (SST 4, SD 000401)
  - nfInstanceId: "smf-instance-001"
    nfType: "SMF"
    nfStatus: "REGISTERED"
    fqdn: "smf-1.example.com" # sBIFQDN for SMF
    pLMNIdList:
      - mcc: "208"
        mnc: "93"
    sNssaiList:
      - sst: 4
        sd: "000401"
        sliceName: "test-slice" # Custom field for descriptive purpose
    nfServices:
      - serviceInstanceId: "smf-service-001"
        serviceName: "nsmf-pdusession"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  # UPF profile for PLMN 208, 93 and S-NSSAI (SST 4, SD 000401)
  - nfInstanceId: "upf-instance-001"
    nfType: "UPF"
    nfStatus: "REGISTERED"
    fqdn: "upf-1.example.com" # sBIFQDN for UPF
    pLMNIdList:
      - mcc: "208"
        mnc: "93"
    upfInfo: # UPF specific information
      sNssaiUpfInfoList:
        - sNssai:
            sst: 4
            sd: "000401"
            sliceName: "test-slice" # Custom field for descriptive purpose
          # Other UPF specific fields like dnnList, pduSessionAnchorSmfInfoList, etc. can be added here
    nfServices:
      - serviceInstanceId: "upf-service-001"
        serviceName: "nupf-pdu-session"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  # PCF profile for PLMN 208, 93 and S-NSSAI (SST 4, SD 000401)
  - nfInstanceId: "pcf-instance-001"
    nfType: "PCF"
    nfStatus: "REGISTERED"
    fqdn: "pcf-1.example.com" # sBIFQDN for PCF
    pLMNIdList:
      - mcc: "208"
        mnc: "93"
    sNssaiList:
      - sst: 4
        sd: "000401"
        sliceName: "test-slice" # Custom field for descriptive purpose
    nfServices:
      - serviceInstanceId: "pcf-service-001"
        serviceName: "npcf-policymanagement"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
nrfInfo:
  servedPcfInfo:
    pcf-1: {}
    pcf-instance-001: {} # Add the new PCF instance to the served list
  servedAmfInfo:
    amf-1: {}
    amf-instance-001: {} # Add the new AMF instance to the served list