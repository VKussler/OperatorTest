# NRM NRF baseline for multi-vendor test
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
    sNSSAIList:
      - sst: 4
        sd: "000401"
sBIFQDN: "nrf-1.sbi.example.com"
nFProfileList:
  - nfInstanceId: "nrf-instance-001"
    nfType: "NRF"
    nfStatus: "REGISTERED"
    fqdn: "nrf-1.example.com"
    nfServices:
      - serviceInstanceId: "service-1"
        serviceName: "nnrf-nfm"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  - nfInstanceId: "open5gs-amf-001"
    nfType: "AMF"
    nfStatus: "REGISTERED"
    fqdn: "open5gs-amf-1.example.com"
    sNSSAIList:
      - sst: 4
        sd: "000401"
    nfServices:
      - serviceInstanceId: "amf-service-namf-comm"
        serviceName: "namf-comm"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
      - serviceInstanceId: "amf-service-namf-evnt"
        serviceName: "namf-evnt"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
    amfInfo:
      amfRegionId: "region-001"
      guamiList:
        - plmnId: { mcc: "208", mnc: "93" }
          amfId: "amf-id-001"
      taiList:
        - plmnId: { mcc: "208", mnc: "93" }
          tac: "000001"
  - nfInstanceId: "open5gs-smf-001"
    nfType: "SMF"
    nfStatus: "REGISTERED"
    fqdn: "open5gs-smf-1.example.com"
    sNSSAIList:
      - sst: 4
        sd: "000401"
    nfServices:
      - serviceInstanceId: "smf-service-nsmf-pdusession"
        serviceName: "nsmf-pdusession"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
    smfInfo:
      sNssaiSmfInfoList:
        - sNssai: { sst: 4, sd: "000401" }
          dnnList: ["internet", "ims"]
  - nfInstanceId: "oai-upf-001"
    nfType: "UPF"
    nfStatus: "REGISTERED"
    fqdn: "oai-upf-1.example.com"
    sNSSAIList:
      - sst: 4
        sd: "000401"
    # UPF typically registers capabilities via upfInfo, not extensive SBI services
    nfServices:
      - serviceInstanceId: "upf-service-nupf-pdu-session"
        serviceName: "nupf-pdu-session" # Placeholder for minimal service
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
    upfInfo:
      sNssaiUpfInfoList:
        - sNssai: { sst: 4, sd: "000401" }
          dnnList: ["internet"]
          interfaceUpfInfoList:
            - interfaceType: "N3"
              ipv4EndpointAddresses: ["10.0.0.10"]
            - interfaceType: "N6"
              ipv4EndpointAddresses: ["10.0.0.11"]
  - nfInstanceId: "oai-nssf-001"
    nfType: "NSSF"
    nfStatus: "REGISTERED"
    fqdn: "oai-nssf-1.example.com"
    sNSSAIList:
      - sst: 4
        sd: "000401"
    nfServices:
      - serviceInstanceId: "nssf-service-nnssf-nssaiavailability"
        serviceName: "nnssf-nssaiavailability"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
      - serviceInstanceId: "nssf-service-nnssf-nsselection"
        serviceName: "nnssf-nsselection"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
    nssfInfo:
      nsiList:
        - "nsi-001"
      nssaiAvailabilityList:
        - plmnId: { mcc: "208", mnc: "93" }
          supportedSnssaiList:
            - sNssai: { sst: 4, sd: "000401" }
              nsacfInfo: {}
  - nfInstanceId: "nrm-pcf-001"
    nfType: "PCF"
    nfStatus: "REGISTERED"
    fqdn: "nrm-pcf-1.example.com"
    sNSSAIList:
      - sst: 4
        sd: "000401"
    nfServices:
      - serviceInstanceId: "pcf-service-npcf-am-policy-control"
        serviceName: "npcf-am-policy-control"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
      - serviceInstanceId: "pcf-service-npcf-smpolicycontrol"
        serviceName: "npcf-smpolicycontrol"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
    pcfInfo:
      servedPcfInfo: {} # Placeholder for specific PCF info if needed
nrfInfo:
  servedPcfInfo:
    pcf-1: {}
  servedAmfInfo:
    amf-1: {}