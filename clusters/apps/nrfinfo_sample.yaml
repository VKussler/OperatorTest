# NRM NRF baseline for multi-vendor test
cNSIIdList:
  - "test-slice"
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
  - pLMNId:
      mcc: "001"
      mnc: "01"
    sNssaiList:
      - sst: 4
        sd: "000401"
sBIFQDN: "test-slice.nrf-1.sbi.example.com"
nFProfileList:
  - nfInstanceId: "nrf-instance-001"
    nfType: "NRF"
    nfStatus: "REGISTERED"
    fqdn: "nrf-1.example.com"
    nfServices:
      - serviceInstanceId: "service-1"
        serviceName: "nnrf-nfm"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  - nfInstanceId: "amf-instance-001"
    nfType: "AMF"
    nfStatus: "REGISTERED"
    fqdn: "amf-1.test-slice.example.com"
    plmnIdList:
      - mcc: "001"
        mnc: "01"
    sNssaiList:
      - sst: 4
        sd: "000401"
    amfInfo:
      amfRegionId: "01"
      amfSetId: "01"
      guamiList:
        - plmnId:
            mcc: "001"
            mnc: "01"
          amfId: "000001"
  - nfInstanceId: "smf-instance-001"
    nfType: "SMF"
    nfStatus: "REGISTERED"
    fqdn: "smf-1.test-slice.example.com"
    plmnIdList:
      - mcc: "001"
        mnc: "01"
    sNssaiList:
      - sst: 4
        sd: "000401"
    smfInfo:
      pduSessionTypes: ["IPV4", "IPV6"]
  - nfInstanceId: "upf-instance-001"
    nfType: "UPF"
    nfStatus: "REGISTERED"
    fqdn: "upf-1.test-slice.example.com"
    plmnIdList:
      - mcc: "001"
        mnc: "01"
    sNssaiList:
      - sst: 4
        sd: "000401"
    upfInfo:
      pduSessionTypes: ["IPV4", "IPV6"]
      interfaceUpfInfoList:
        - interfaceType: "N3"
          endpoints: ["192.168.1.10"]
        - interfaceType: "N6"
          endpoints: ["10.0.0.10"]
nrfInfo:
  servedPcfInfo:
    pcf-1: {}
  servedAmfInfo:
    amf-1: {}