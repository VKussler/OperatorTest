# NRM NRF baseline for multi-vendor test
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
sBIFQDN: "nrf-1.sbi.example.com"
nFProfileList:
  - nfInstanceId: "nrf-instance-001"
    nfType: "NRF"
    nfStatus: "REGISTERED"
    fqdn: "nrf-1.example.com"
    nfServices:
      - serviceInstanceId: "service-1"
        serviceName: "nnrf-nfm"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
    pLMNList: # Added for consistency, NRF serves this PLMN
      - mcc: "208"
        mnc: "93"
  - nfInstanceId: "amf-instance-001"
    nfType: "AMF"
    nfStatus: "REGISTERED"
    fqdn: "amf-1.example.com"
    pLMNList:
      - mcc: "208"
        mnc: "93"
    sNssaiList: # AMF supports the new S-NSSAI
      - sst: 4
        sd: "000401"
    nfServices:
      - serviceInstanceId: "amf-service-1"
        serviceName: "namf-comm"
        versions: ["1.0.0"]
        nfServiceStatus: "REGISTERED"
    guamiList: # Example GUAMI for the AMF
      - plmnId:
          mcc: "208"
          mnc: "93"
        amfId: "000001"
    taiList: # Example TAI for the AMF
      - plmnId:
          mcc: "208"
          mnc: "93"
        tac: "000001"
  - nfInstanceId: "smf-instance-001"
    nfType: "SMF"
    nfStatus: "REGISTERED"
    fqdn: "smf-1.example.com"
    pLMNList:
      - mcc: "208"
        mnc: "93"
    sNssaiList: # SMF supports the new S-NSSAI
      - sst: 4
        sd: "000401"
    nfServices:
      - serviceInstanceId: "smf-service-1"
        serviceName: "nsmf-pdusession"
        versions: ["1.0.0"]
        nfServiceStatus: "REGISTERED"
  - nfInstanceId: "upf-instance-001"
    nfType: "UPF"
    nfStatus: "REGISTERED"
    fqdn: "upf-1.example.com"
    pLMNList:
      - mcc: "208"
        mnc: "93"
    upfInfo:
      sNssaiUpfInfoList: # UPF supports the new S-NSSAI with associated DNNs
        - sNssai:
            sst: 4
            sd: "000401"
          dnnList:
            - "internet"
            - "test-slice-dnn" # A DNN specific to this slice
  - nfInstanceId: "nssf-instance-001"
    nfType: "NSSF"
    nfStatus: "REGISTERED"
    fqdn: "nssf-1.example.com"
    pLMNList:
      - mcc: "208"
        mnc: "93"
    nssfInfo:
      nssaiAvailabilityList: # NSSF advertises availability for the new S-NSSAI
        - plmnId:
            mcc: "208"
            mnc: "93"
          supportedSnssaiList:
            - sst: 4
              sd: "000401"
    nfServices:
      - serviceInstanceId: "nssf-service-1"
        serviceName: "nnssf-nsselection"
        versions: ["1.0.0"]
        nfServiceStatus: "REGISTERED"
  - nfInstanceId: "pcf-instance-001"
    nfType: "PCF"
    nfStatus: "REGISTERED"
    fqdn: "pcf-1.example.com"
    pLMNList:
      - mcc: "208"
        mnc: "93"
    sNssaiList: # PCF supports the new S-NSSAI
      - sst: 4
        sd: "000401"
    nfServices:
      - serviceInstanceId: "pcf-service-1"
        serviceName: "npcf-policyauthorization"
        versions: ["1.0.0"]
        nfServiceStatus: "REGISTERED"
nrfInfo:
  servedPcfInfo:
    pcf-1: {}
  servedAmfInfo:
    amf-1: {}
  servedSmfInfo: # Added SMF to served NFs
    smf-1: {}
  servedUpfInfo: # Added UPF to served NFs
    upf-1: {}
  servedNssfInfo: # Added NSSF to served NFs
    nssf-1: {}