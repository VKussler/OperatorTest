# Sample NRF NRM Instance
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
sBIFQDN: "nrf-1.sbi.example.com"
nFProfileList:
  - nfInstanceId: "nrf-instance-001"
    nfType: "NRF"
    nfStatus: "REGISTERED"
    fqdn: "nrf-1.example.com"
    nfServices:
      - serviceInstanceId: "service-1"
        serviceName: "nnrf-nfm"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
nrfInfo:
  servedPcfInfo:
    pcf-1: {}
  servedAmfInfo:
    amf-1: {}
  # NRF's own supported S-NSSAIs, indicating it can handle this slice
  supportedSnssaiList:
    - sst: 4
      sd: "000401" # Represents "test-slice"
  # Configuration for NF registration verification to address the risk finding
  nfRegistrationVerification:
    enabled: true # Enable the verification process
    targetNfTypes: # Specify which NF types require verification
      - "AMF"
      - "SMF"
      - "UPF"
      - "NSSF"
      - "PCF"
    requiredSnssaiSupport: # Define the S-NSSAI that NFs must support
      - sst: 4
        sd: "000401" # NFs must confirm support for "test-slice"
    # Optional: Add a re-evaluation trigger or frequency if needed for dynamic verification
    # reEvaluationTrigger: "on-registration-update"