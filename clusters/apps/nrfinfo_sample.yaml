# Sample NRF NRM Instance
pLMNInfoList:
  - pLMNId:
      mcc: "208"
      mnc: "93"
  - pLMNId:
      mcc: "001"
      mnc: "01"
    sNSSAI:
      sst: 4
      sd: "000401"
sBIFQDN: "test-slice.sbi.example.com"
nFProfileList:
  - nfInstanceId: "nrf-instance-001"
    nfType: "NRF"
    nfStatus: "REGISTERED"
    fqdn: "nrf-1.example.com"
    nfServices:
      - serviceInstanceId: "service-1"
        serviceName: "nnrf-nfm"
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
  - nfInstanceId: "test-slice-amf-001" # New NF instance for the slice
    nfType: "AMF" # Assuming an AMF serves the slice, could be SMF or NSSF
    nfStatus: "REGISTERED"
    fqdn: "test-slice-amf.example.com"
    sNssaiList: # To make the slice information discoverable
      - sst: 4
        sd: "000401"
    cNSIIdList: ["test-slice"] # As requested
    nfServices:
      - serviceInstanceId: "test-slice-amf-service"
        serviceName: "namf-comm" # Example service for AMF
        versions: ["1.0.0"]
        schema: "oas3"
        nfServiceStatus: "REGISTERED"
nrfInfo:
  servedPcfInfo:
    pcf-1: {}
  servedAmfInfo:
    amf-1: {}